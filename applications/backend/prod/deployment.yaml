apiVersion: apps/v1
kind: Deployment
metadata:
  name: prod-backend
  labels:
    component: bdi
spec:
  replicas: 1
  selector:
    matchLabels:
      component: bdi
  template:
    metadata:
      labels:
        component: bdi
    spec:
      nodeName: prod-app-02
      containers:
      - name: main
        image: registry.gitlab.com/visai-ai/projects/bdi/application/backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
        env:
        - name: ARENA_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: prod-secret
              key: ARENA_ENCRYPTION_KEY
        - name: BETTER_AUTH_SECRET
          valueFrom:
            secretKeyRef:
              name: prod-secret
              key: BETTER_AUTH_SECRET
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: prod-secret
              key: DATABASE_URL
        - name: INTERNAL_AI_API_KEY
          valueFrom:
            secretKeyRef:
              name: prod-secret
              key: INTERNAL_AI_API_KEY
        - name: LLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: prod-secret
              key: LLM_API_KEY
        - name: LLM_ARENA_1_API_KEY
          valueFrom:
            secretKeyRef:
              name: prod-secret
              key: LLM_ARENA_1_API_KEY
        - name: LLM_ARENA_2_API_KEY
          valueFrom:
            secretKeyRef:
              name: prod-secret
              key: LLM_ARENA_2_API_KEY
        - name: LLM_ARENA_3_API_KEY
          valueFrom:
            secretKeyRef:
              name: prod-secret
              key: LLM_ARENA_3_API_KEY
        - name: LLM_ARENA_4_API_KEY
          valueFrom:
            secretKeyRef:
              name: prod-secret
              key: LLM_ARENA_4_API_KEY
        - name: LLM_ARENA_5_API_KEY
          valueFrom:
            secretKeyRef:
              name: prod-secret
              key: LLM_ARENA_5_API_KEY
        - name: MEDICAL_FACTS_API_KEY
          valueFrom:
            secretKeyRef:
              name: prod-secret
              key: MEDICAL_FACTS_API_KEY
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: prod-secret
              key: POSTGRES_PASSWORD
        - name: SMTP_USER
          valueFrom:
            secretKeyRef:
              name: prod-secret
              key: SMTP_USER
        - name: SMTP_PASS
          valueFrom:
            secretKeyRef:
              name: prod-secret
              key: SMTP_PASS
        - name: RABBITMQ_URL
          valueFrom:
            secretKeyRef:
              name: prod-secret
              key: RABBITMQ_URL
        - name: GOOGLE_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: prod-secret
              key: GOOGLE_CLIENT_ID
        - name: GOOGLE_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: prod-secret
              key: GOOGLE_CLIENT_SECRET
        - name: VAPID_KEYS_PRIVATE_KEY
          valueFrom:
            secretKeyRef:
              name: prod-secret
              key: VAPID_KEYS_PRIVATE_KEY
        envFrom:
        - configMapRef:
            name: prod-backend-conf
        resources:
          requests:
            memory: 2Gi
            cpu: 2
      restartPolicy: Always
      imagePullSecrets:
      - name: prod-image-pull-secret
---
