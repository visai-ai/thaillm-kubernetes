apiVersion: v1
kind: Service
metadata:
  name: prod-backend
spec:
  type: ClusterIP
  selector:
    component: bdi
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3001
---
apiVersion: v1
kind: Service
metadata:
  name: prod-backend-siriraj
spec:
  type: ClusterIP
  selector:
    component: siriraj
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3001
